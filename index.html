<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corkscrew Games</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f2f2f2;
  color:#222;
  text-align:center;
}

header{
  padding:40px 20px;
}

/* ロゴ */
.logo{
  font-size:52px;
  font-weight:700;
  background:#000;
  color:#fff;
  padding:10px 20px;
  border-radius:8px;
}

/* アニメエリア */
.pixel-area{
  position:relative;
  height:80px;
  margin-top:20px;
  overflow:hidden;
}

/* 棒人間 */
.man{
  position:absolute;
  bottom:0;
  width:6px;
  background:#000;
}

/* サイズ（家族感） */
.A{ height:40px; } /* 親 */
.B{ height:34px; }
.C{ height:28px; } /* 子 */
.D{ height:20px; } /* 小さい子 */

/* ---------------- */
/* A：親（ゆっくり見守る） */
/* ---------------- */
.A{
  animation: walkA 18s linear infinite;
}

@keyframes walkA{
  0%{ left:-40px; transform:translateY(0); }
  40%{ left:32%; transform:translateY(0); }

  /* 少し止まる（見守る） */
  55%{ left:34%; transform:translateY(0); }

  100%{ left:100%; transform:translateY(0); }
}

/* ---------------- */
/* B：気づく人 */
/* ---------------- */
.B{
  animation: walkB 18s linear infinite;
}

@keyframes walkB{
  0%{ left:-80px; transform:translateY(0); }
  40%{ left:30%; transform:translateY(0); }

  /* 少し前に出る（気づく） */
  50%{ left:34%; transform:translateY(0); }

  /* 少し戻る */
  60%{ left:32%; transform:translateY(0); }

  100%{ left:100%; transform:translateY(0); }
}

/* ---------------- */
/* C：子供（転ぶ） */
/* ---------------- */
.C{
  animation: walkC 18s linear infinite;
}

@keyframes walkC{
  0%{ left:-120px; transform:translateY(0) rotate(0); }
  45%{ left:35%; transform:translateY(0) rotate(0); }

  /* 転ぶ（ほんの少しズレ） */
  50%{ left:36%; transform:translateY(2px) rotate(90deg); }

  /* 少し止まる */
  60%{ left:36%; transform:translateY(0) rotate(90deg); }

  /* 起きる */
  70%{ transform:translateY(0) rotate(0); }

  100%{ left:100%; transform:translateY(0) rotate(0); }
}

/* ---------------- */
/* D：小さい子（不安で戻る） */
/* ---------------- */
.D{
  animation: walkD 18s linear infinite;
}

@keyframes walkD{
  0%{ left:-160px; transform:translateY(0); }
  45%{ left:33%; transform:translateY(0); }

  /* 少し戻る */
  50%{ left:31%; transform:translateY(1px); }

  /* 少し止まる */
  65%{ left:31%; transform:translateY(0); }

  100%{ left:100%; transform:translateY(0); }
}

/* ---------------- */
/* セクション */
/* ---------------- */

section{
  max-width:600px;
  margin:40px auto;
  padding:0 20px;
  text-align:left;
}

h2{
  border-bottom:1px solid #ccc;
  padding-bottom:10px;
  margin-bottom:20px;
}

section p, .link{
  font-size:12px;
}

.game-list a{
  display:block;
  background:#fff;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  text-decoration:none;
  color:#222;
}

.link{
  color:#4da6ff;
}

footer{
  margin-top:60px;
  font-size:12px;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    C<span style="color:#ff8a1a;">or</span>kscre<span style="color:#70d4ff;">w</span> Games
  </div>

  <div class="pixel-area">
    <div class="man A"></div>
    <div class="man B"></div>
    <div class="man C"></div>
    <div class="man D"></div>
  </div>

</header>

<section>
<h2>Game</h2>
<p>All games are playable without download.</p>

<div class="game-list">
  <a href="#">title 1</a>
  <a href="#">title 2</a>
  <a href="#">title 3</a>
  <a href="#">title 4</a>
</div>
</section>

<section>
<h2>Business</h2>
<p>Customizable for events & promotions.</p>
</section>

<section>
<h2>Contact</h2>
<a class="link" href="#">Get in Touch</a>
</section>

<footer>
© 2026 Takuya Kozai
</footer>

</body>
</html>
