<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corkscrew Games</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f2f2f2;
  color:#222;
  text-align:center;
}

header{
  padding:40px 20px;
}

/* ロゴ：黒背景に白文字 */
.logo{
  font-size:52px;
  font-weight:700;
  letter-spacing:1px;
  line-height:1.1;
  display: inline-block;
  background-color: #000; /* 黒背景 */
  color: #fff;            /* 白文字 */
  padding: 10px 20px;
  border-radius: 8px;     /* 角丸 */
}

/* セクション共通 */
section{
  max-width:600px;
  margin:40px auto;
  padding:0 20px;
  text-align:left;
}

h2{
  border-bottom:1px solid #ccc;
  padding-bottom:10px;
  margin-bottom:20px;
}

/* Gameセクション説明文をBusinessのpと揃える */
section .tagline {
  margin-top:0;
  margin-bottom:20px;
  font-size:16px;     /* Businessのpと同じ */
  color:#222;         /* Businessのpと同じ色 */
  font-weight:400;    /* 通常文章と同じ */
  line-height:1.5;
}

/* ゲームリスト */
.game-list a{
  display:block;
  background:#ffffff;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  text-decoration:none;
  color:#222;
  transition:0.2s;
}

.game-list a:hover{
  background:#e6e6e6;
}

/* リンク */
.link{
  display:block;
  margin-bottom:12px;
  color:#4da6ff;
  text-decoration:none;
  font-weight:500;
}

.link:hover{
  text-decoration:underline;
}

/* スマホ */
@media (max-width: 600px) {
  .logo{
    font-size:42px;
    line-height:1.05;
  }
}

footer{
  margin-top:60px;
  padding:20px;
  font-size:12px;
  color:#666;
}

</style>
</head>

<body>

<header>
  <div class="logo">Corkscrew Games</div>
</header>

<!-- Games -->
<section>
<h2>Game</h2>

<p class="tagline">All games are playable without download.</p>

<div class="game-list">
  <a href="#">title 1</a>
  <a href="#">title 2</a>
  <a href="#">title 3</a>
  <a href="#">title 4</a>
</div>
</section>

<!-- Business -->
<section>
<h2>Business</h2>

<p>Customizable for events & promotions.</p>

</section>

<!-- Contact -->
<section>
<h2>Contact</h2>

<a class="link" href="https://docs.google.com/forms/d/e/1FAIpQLSfoyW_CNaztiuZGE3RXhN_NbS4yNZpVx0BgshRme7UXk-YVrA/viewform?usp=publish-editor">
Get in Touch
</a>

</section>

<footer>
© 2026 Takuya Kozai
</footer>

</body>
</html>
