<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corkscrew Games</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#ddd;
  display:flex;
  justify-content:center;
}

/* フレーム */
.frame{
  max-width:370px;
  width:100%;
  background:#f2f2f2;
}

/* ヘッダー */
header{
  padding:30px 10px;
  text-align:center;
}

/* ロゴ（ここが今回の重要ポイント） */
.logo{
  font-size:clamp(22px, 6vw, 32px);
  font-weight:700;
  background:#000;
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  display:inline-block;
  white-space:nowrap;
}

/* アニメ */
.pixel-area{
  position:relative;
  height:70px;
  margin-top:15px;
  overflow:hidden;
}

.man{
  position:absolute;
  bottom:0;
  width:5px;
  background:#000;
}

/* サイズ */
.A{ height:38px; }
.B{ height:32px; }
.C{ height:26px; }
.D{ height:18px; }

/* A */
.A{ animation:A 18s linear infinite; }
@keyframes A{
  0%{ left:-30px; transform:translateY(0); }
  40%{ left:30%; }
  55%{ left:32%; }
  100%{ left:95%; transform:translateY(0); }
}

/* B */
.B{ animation:B 18s linear infinite; }
@keyframes B{
  0%{ left:-60px; transform:translateY(0); }
  40%{ left:28%; }
  50%{ left:32%; }
  60%{ left:30%; }
  100%{ left:100%; transform:translateY(0); }
}

/* C */
.C{ animation:C 18s linear infinite; }
@keyframes C{
  0%{ left:-90px; transform:translateY(0) rotate(0); }
  45%{ left:34%; }
  50%{ left:35%; transform:translateY(2px) rotate(90deg); }
  60%{ left:35%; transform:translateY(2px) rotate(90deg); }
  70%{ transform:rotate(0); }
  100%{ left:105%; transform:translateY(0) rotate(0); }
}

/* D */
.D{ animation:D 18s linear infinite; }
@keyframes D{
  0%{ left:-120px; transform:translateY(0); }
  45%{ left:32%; }
  50%{ left:30%; }
  65%{ left:30%; }
  100%{ left:110%; transform:translateY(0); }
}

/* スマホ速度 */
@media (max-width:600px){
  .A,.B,.C,.D{
    animation-duration:14s;
  }
}

/* セクション */
section{
  padding:10px 20px;
}

h2{
  border-bottom:1px solid #ccc;
  font-size:14px;
  margin-bottom:10px;
}

p, .link{
  font-size:12px;
}

.game-list a{
  display:block;
  background:#fff;
  padding:12px;
  margin-bottom:8px;
  border-radius:8px;
  text-decoration:none;
  color:#222;
}

.link{
  color:#4da6ff;
}

footer{
  font-size:11px;
  margin-top:20px;
  padding:10px;
  text-align:center;
}

</style>
</head>

<body>

<div class="frame">

<header>
  <div class="logo">
    C<span style="color:#ff8a1a;">or</span>kscre<span style="color:#70d4ff;">w</span> Games
  </div>

  <div class="pixel-area">
    <div class="man A"></div>
    <div class="man B"></div>
    <div class="man C"></div>
    <div class="man D"></div>
  </div>
</header>

<section>
<h2>Game</h2>
<p>All games are playable without download.</p>

<div class="game-list">
  <a href="#">title 1</a>
  <a href="#">title 2</a>
  <a href="#">title 3</a>
  <a href="#">title 4</a>
</div>
</section>

<section>
<h2>Business</h2>
<p>Customizable for events & promotions.</p>
</section>

<section>
<h2>Contact</h2>
<a class="link" href="#">
Get in Touch
</a>
</section>

<footer>
© 2026 Takuya Kozai
</footer>

</div>

</body>
</html>
